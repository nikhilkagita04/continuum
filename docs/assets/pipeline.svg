<svg width="100%" viewBox="0 0 880 132" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, sans-serif">
  <title>Continuum pipeline</title>
  <desc>Four stages — capture, segment, index, distill. The first three run locally and free; only distill uses an LLM, batched so it makes roughly 1000× fewer calls than processing every frame.</desc>
  <style>
    .bx{fill:#c9c9ce}
    .bxe{fill:#1d1d1f}
    .tx{fill:#1d1d1f}
    .txe{fill:#ffffff}
    .sub{fill:#86868b}
    .ar{stroke:#b0b0b6}
    @media (prefers-color-scheme:dark){
      .bx{fill:#3a3a3d}
      .bxe{fill:#f5f5f7}
      .tx{fill:#f5f5f7}
      .txe{fill:#0a0a0b}
      .sub{fill:#98989f}
      .ar{stroke:#5a5a61}
    }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path class="ar" d="M2 2L7 5L2 8" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bx" x="30"  y="26" width="160" height="56" rx="14"/>
  <text class="tx" x="110" y="59" text-anchor="middle" font-size="16" font-weight="600" letter-spacing=".2">Capture</text>

  <rect class="bx" x="250" y="26" width="160" height="56" rx="14"/>
  <text class="tx" x="330" y="59" text-anchor="middle" font-size="16" font-weight="600" letter-spacing=".2">Segment</text>

  <rect class="bx" x="470" y="26" width="160" height="56" rx="14"/>
  <text class="tx" x="550" y="59" text-anchor="middle" font-size="16" font-weight="600" letter-spacing=".2">Index</text>

  <rect class="bxe" x="690" y="26" width="160" height="56" rx="14"/>
  <text class="txe" x="770" y="59" text-anchor="middle" font-size="16" font-weight="600" letter-spacing=".2">Distill</text>

  <line class="ar" x1="198" y1="54" x2="242" y2="54" stroke-width="1.4" marker-end="url(#a)"/>
  <line class="ar" x1="418" y1="54" x2="462" y2="54" stroke-width="1.4" marker-end="url(#a)"/>
  <line class="ar" x1="638" y1="54" x2="682" y2="54" stroke-width="1.4" marker-end="url(#a)"/>

  <text class="sub" x="110" y="106" text-anchor="middle" font-size="12.5">what's on screen</text>
  <text class="sub" x="330" y="106" text-anchor="middle" font-size="12.5">grouped to episodes</text>
  <text class="sub" x="550" y="106" text-anchor="middle" font-size="12.5">all searchable</text>
  <text class="sub" x="770" y="106" text-anchor="middle" font-size="12.5">~1000× fewer LLM calls</text>
</svg>
