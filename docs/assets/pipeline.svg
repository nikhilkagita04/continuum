<svg width="100%" viewBox="0 0 880 132" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif">
  <title>Continuum pipeline</title>
  <desc>Four stages — capture, segment, index, distill — turning about 29,000 events a day into about 30 LLM calls a day. The first three run locally and free; only distill uses an LLM.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L7 5L2 8" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30"  y="26" width="160" height="56" rx="14" fill="#475569"/>
  <text x="110" y="59" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing=".2">Capture</text>

  <rect x="250" y="26" width="160" height="56" rx="14" fill="#475569"/>
  <text x="330" y="59" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing=".2">Segment</text>

  <rect x="470" y="26" width="160" height="56" rx="14" fill="#475569"/>
  <text x="550" y="59" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing=".2">Index</text>

  <rect x="690" y="26" width="160" height="56" rx="14" fill="#6366f1"/>
  <text x="770" y="59" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing=".2">Distill</text>

  <line x1="198" y1="54" x2="242" y2="54" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="418" y1="54" x2="462" y2="54" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="638" y1="54" x2="682" y2="54" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a)"/>

  <text x="110" y="106" text-anchor="middle" fill="#94a3b8" font-size="12.5">≈29k events/day</text>
  <text x="330" y="106" text-anchor="middle" fill="#94a3b8" font-size="12.5">≈300 episodes</text>
  <text x="550" y="106" text-anchor="middle" fill="#94a3b8" font-size="12.5">all searchable</text>
  <text x="770" y="106" text-anchor="middle" fill="#94a3b8" font-size="12.5">≈30 LLM calls/day</text>
</svg>
